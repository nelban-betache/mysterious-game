<!DOCTYPE html>
<html lang="en">

<title>UNKNOWN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,300;1,300;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;touch-action:none;}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
.screen.hidden{display:none!important;}
#titleScreen{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);}
.scan-line{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.03) 2px,rgba(255,255,255,0.03) 4px);pointer-events:none;}
.t-logo{font-family:'Share Tech Mono',monospace;font-size:clamp(30px,9vw,56px);color:#e0e0ff;letter-spacing:.35em;animation:glitch 5s infinite;text-shadow:0 0 20px rgba(100,150,255,0.4);}
.t-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,13px);color:#7080aa;letter-spacing:.5em;margin-top:14px;text-transform:uppercase;}
.t-hint{font-family:'Crimson Pro',serif;font-style:italic;font-size:clamp(13px,3.5vw,17px);color:#6070a0;margin-top:36px;}
.t-start{margin-top:56px;font-family:'Share Tech Mono',monospace;font-size:clamp(12px,3vw,15px);color:#a0b0e0;border:1px solid #4a5a8a;padding:14px 44px;letter-spacing:.35em;background:rgba(100,130,220,0.1);cursor:pointer;transition:.3s;}
.t-start:active{color:#fff;border-color:#a0b4ff;background:rgba(100,130,220,0.25);}
.t-credit{position:absolute;bottom:18px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a5a7a;letter-spacing:.2em;}
#hud{position:fixed;top:0;left:0;width:100%;padding:10px 14px;display:none;justify-content:space-between;align-items:center;z-index:30;pointer-events:none;}
#hud span{font-family:'Share Tech Mono',monospace;font-size:11px;color:#7a8ab0;letter-spacing:.2em;pointer-events:none;}
#restartBtn{font-family:'Share Tech Mono',monospace;font-size:14px;color:#a0b0d0;background:rgba(100,130,220,0.15);border:1px solid #4a6aaa;border-radius:8px;padding:8px 16px;cursor:pointer;letter-spacing:.15em;pointer-events:all;-webkit-touch-callout:none;touch-action:manipulation;}
#restartBtn:active{color:#fff;border-color:#a0c0ff;background:rgba(100,150,255,0.3);}
#msgWrap{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:9;pointer-events:none;}
#msgTxt{font-family:'Crimson Pro',serif;font-style:italic;font-size:clamp(14px,4vw,19px);color:#8090c0;text-align:center;padding:0 36px;line-height:1.7;opacity:0;transition:opacity 1.4s;max-width:340px;}
#msgTxt.show{opacity:1;}
#deathScreen{background:rgba(10,10,30,0.95);z-index:22;}
.d-title{font-family:'Share Tech Mono',monospace;font-size:clamp(22px,7vw,36px);color:#cc4444;letter-spacing:.4em;text-shadow:0 0 20px rgba(200,50,50,0.5);}
.d-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2.5vw,12px);color:#7a6060;margin-top:18px;letter-spacing:.25em;text-align:center;padding:0 30px;}
.d-retry{margin-top:48px;font-family:'Share Tech Mono',monospace;font-size:clamp(11px,3vw,14px);color:#a09090;border:1px solid #604040;padding:12px 38px;letter-spacing:.3em;background:transparent;cursor:pointer;transition:.3s;}
.d-retry:active{color:#fff;border-color:#cc6666;}
#endScreen{background:linear-gradient(160deg,#1a1a2e,#0f2040);z-index:25;padding:28px;overflow-y:auto;}
#endLetter{font-family:'Crimson Pro',serif;font-style:italic;font-weight:300;font-size:clamp(15px,4.5vw,21px);color:#b0bde0;text-align:center;line-height:2;max-width:360px;white-space:pre-line;opacity:0;animation:revealUp 2s forwards 1s;}
#endHeart{font-size:clamp(22px,6vw,34px);opacity:0;animation:revealUp 2s forwards 7s;display:block;text-align:center;margin-top:28px;color:#e080a0;}
#endCredit{font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a5a7a;letter-spacing:.3em;opacity:0;animation:revealUp 2s forwards 9s;display:block;text-align:center;margin-top:20px;}
#gameCanvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:block;image-rendering:pixelated;}
#ctrlBar{position:fixed;bottom:0;left:0;width:100%;padding:14px 18px 28px;display:none;justify-content:space-between;align-items:flex-end;z-index:11;}
.lr-wrap{display:flex;gap:10px;}
.btn-lr{width:74px;height:74px;background:rgba(100,130,220,0.12);border:1px solid rgba(150,180,255,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(180,200,255,0.6);cursor:pointer;-webkit-touch-callout:none;transition:background .1s;}
.btn-lr.pressed,.btn-lr:active{background:rgba(100,150,255,0.3);color:#fff;}
#btnJump{width:90px;height:90px;background:rgba(100,130,220,0.12);border:2px solid rgba(150,180,255,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;cursor:pointer;-webkit-touch-callout:none;transition:background .1s;}
#btnJump .j-arrow{font-size:24px;color:rgba(180,200,255,0.7);line-height:1;}
#btnJump .j-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(150,180,255,0.5);letter-spacing:.15em;}
#btnJump.pressed,#btnJump:active{background:rgba(100,150,255,0.3);border-color:rgba(200,220,255,0.6);}
#btnJump.pressed .j-arrow{color:#fff;}
.theme-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:#5a6a8a;letter-spacing:.4em;margin-top:36px;text-transform:uppercase;}
#themePicker{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:14px;max-width:300px;}
.theme-btn{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.2em;padding:8px 14px;border:2px solid #444;border-radius:8px;cursor:pointer;color:#ccc;transition:all .2s;opacity:.6;}
.theme-btn.active{opacity:1;transform:scale(1.08);color:#fff;}
.theme-btn:active{transform:scale(0.96);}
@keyframes glitch{0%,88%,100%{text-shadow:0 0 20px rgba(100,150,255,0.4);transform:none;}89%{text-shadow:-2px 0 #f66,2px 0 #6ff;transform:skewX(-1deg);}90%{text-shadow:2px 0 #f66,-2px 0 #6ff;transform:skewX(1deg);}91%{text-shadow:0 0 20px rgba(100,150,255,0.4);transform:none;}95%{text-shadow:-1px 0 #f66,1px 0 #6ff;}96%{text-shadow:0 0 20px rgba(100,150,255,0.4);}}
@keyframes revealUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

<body>

<div id="titleScreen" class="screen">
  <div class="scan-line"></div>
  <div class="t-logo">∅ UNKNOWN</div>
  <div class="t-sub">Subject [REDACTED] — Protocol 7</div>
  <div class="t-hint">something is waiting at the end</div>

  <div class="theme-label">CHOOSE THEME</div>
  <div id="themePicker">
    <div class="theme-btn active" data-theme="blue"    style="background:#2a3a6a;border-color:#6090ff;">BLUE</div>
    <div class="theme-btn"        data-theme="dark"    style="background:#111;border-color:#444;">DARK</div>
    <div class="theme-btn"        data-theme="forest"  style="background:#1a3a20;border-color:#4aaa55;">FOREST</div>
    <div class="theme-btn"        data-theme="sunset"  style="background:#3a1a10;border-color:#ff6633;">SUNSET</div>
    <div class="theme-btn"        data-theme="purple"  style="background:#2a1a4a;border-color:#aa66ff;">PURPLE</div>

  <button class="t-start" id="startBtn">[ ENTER ]</button>

  <div class="d-title">TERMINATED</div>
  <div class="d-sub" id="deathMsg">You were never meant to reach the end.</div>
  <button class="d-retry" id="retryBtn">[ TRY AGAIN ]</button>
</div>

<div id="endScreen" class="screen hidden">
  <div id="endLetter"></div>
  <span id="endHeart">♡</span>
  <span id="endCredit">© 2026 vibe coding — NLBNxAI</span>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <span id="lblLevel">LEVEL 1</span>
  <span id="lblDeaths">DEATHS: 0</span>
  <button id="restartBtn">↺</button>
</div>
<div id="msgWrap"><div id="msgTxt"></div></div>

<div id="ctrlBar">
  <div class="lr-wrap">
    <div class="btn-lr" id="btnLeft">◀</div>
    <div class="btn-lr" id="btnRight">▶</div>
  </div>
  <div id="btnJump">
    <span class="j-arrow">▲</span>
    <span class="j-label">JUMP</span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CW=320, CH=480, TS=20;

function resize(){
  const s=Math.min(window.innerWidth/CW, window.innerHeight/CH);
  canvas.width=CW; canvas.height=CH;
  canvas.style.width=Math.floor(CW*s)+'px';
  canvas.style.height=Math.floor(CH*s)+'px';
}
resize();
window.addEventListener('resize',resize);

// ── State
const KEY={left:false,right:false};
let jumpPressed=false, deaths=0, levelIdx=0;
let gameRunning=false, isDead=false;
let msgTimer=null, glitchT=0, lastTS=0;

// ── Player
const P={x:0,y:0,vx:0,vy:0,w:12,h:14,onGround:false};

// ── Level data
let MAP=[], mapRows=0, mapCols=0;
let goalR=0, goalC=0;
let fakeTiles={};
let mPlats=[];
let particles=[];
let camX=0, camY=0;

const FAKE_MS=600;
const GRAVITY=900, JUMP_V=-420, WALK=120, FRIC=0.70;
const COYOTE_MS=120; // ms after leaving ground where jump still works
let coyoteTimer=0;   // counts down in ms

const CRYPTIC=["you are being observed.","not everything is what it seems.","keep going.","you're closer than you think.","why are you still here?","something remembers you.","the path was chosen before you arrived.","almost.","∅","do you feel it?","it was always meant to be you."];
const DEAD_MSG=["You were never meant to reach the end.","The path rejects you.","Try again. Or don't.","Nothing persists here.","Almost... but not yet.","The floor remembers.","You fell for it.","Again.","Pain is part of the design."];

// ── Levels
// tiles: #=wall space=air ^=spike G=goal F=fake P=spawn
const LEVELS=[
{msg:"find the door.", dark:false,
 map:["####################",
      "#                  #",
      "#  P               #",
      "#                  #",
      "######    ##########",
      "#                  #",
      "#                  #",
      "#     ######       #",
      "#                  #",
      "#                G #",
      "####################"]},

{msg:"not every step is safe.", dark:false,
 map:["####################",
      "#                  #",
      "# P                #",
      "######   ###########",
      "#    ^             #",
      "#  ######    ##### #",
      "#                  #",
      "#          ######  #",
      "#                G #",
      "####################"]},

{msg:"walls remember your touch.", dark:false,
 map:["####################",
      "#P                 #",
      "#                  #",
      "#                  #",
      "####               #",
      "#    ^             #",
      "#  ######          #",
      "#         ^        #",
      "#      ########    #",
      "#               G  #",
      "####################"]},

{msg:"you're closer than you think.", dark:false,
 map:["####################",
      "#                  #",
      "# P                #",
      "#######  FFFF  #####",
      "#                  #",
      "########  ##########",
      "#       ^          #",
      "#  ######  ########",
      "#              G   #",
      "####################"]},

{msg:"timing is everything.", dark:false,
 map:["####################",
      "#P                 #",
      "###                #",
      "#                  #",
      "#  ^    ^    ^     #",
      "####         ######",
      "#                  #",
      "#                  #",
      "#              G   #",
      "####################"],
 mp:[{x:80,y:260,w:60,h:10,sp:50,rng:140,ax:'x'}]},

{msg:"something is watching.", dark:false,
 map:["####################",
      "#P    #    #       #",
      "#     #    #  ##   #",
      "## ####    ####    #",
      "#      ^   ^       #",
      "#  #####   #########",
      "#      ^           #",
      "######    ##########",
      "#              G   #",
      "####################"]},

{msg:"do you feel it?", dark:true,
 map:["####################",
      "#P                 #",
      "#  ##    ##   ##   #",
      "#   # ^  #  ^ #    #",
      "#   #    #    # ## #",
      "#   #####     ####  ",
      "#              ^   #",
      "#######    #########",
      "#              G   #",
      "####################"]},

{msg:"why are you still here?", dark:true,
 map:["####################",
      "#P                 #",
      "#  ###  ###  ###   #",
      "#    ^       ^     #",
      "##   #   ##   #  ###",
      "#    #        #    #",
      "#    ######   #    #",
      "#         ^       ##",
      "########           #",
      "#              G   #",
      "####################"]},

{msg:"almost.", dark:true,
 map:["####################",
      "#P                 #",
      "##                 #",
      "#    ^       ^     #",
      "###                #",
      "#                  #",
      "#         ^        #",
      "#######        #####",
      "#              G   #",
      "####################"],
 mp:[{x:60,y:235,w:70,h:10,sp:30,rng:130,ax:'x'}]},

{msg:"∅", dark:true,
 map:["####################",
      "#P ^ ^ ^ ^ ^ ^ ^ ^#",
      "####################",
      "#^ ^ ^ ^ ^ ^ ^ ^ ^#",
      "## # # # # # # # ##",
      "#                  #",
      "###   #########  ###",
      "#  ^           ^   #",
      "#######    #########",
      "#          G       #",
      "####################"]},

{msg:"one way leads nowhere.", dark:true,
 map:["####################",
      "#P  ###   ###   ## #",
      "#   # ^   ^ #   #  #",
      "#   #       #   #  #",
      "####  ###   #### ^ #",
      "#  ^  # ^          #",
      "#  ######  #########",
      "#       ^       ^  #",
      "#########  #########",
      "#              G   #",
      "####################"]},

{msg:"it was always meant to be you.", dark:true,
 map:["####################",
      "#                  #",
      "#  P    #####      #",
      "#       #   #  ^   #",
      "#  ######   ########",
      "#  #            ^  #",
      "#  #  ###  ######  #",
      "#  #  # ^          #",
      "#  #  #    G  #####",
      "########    ########",
      "####################"]},

{msg:"something is waiting.", dark:true, final:true,
 map:["####################",
      "#P ^ ^ ^ ^ ^ ^ ^ ^#",
      "####################",
      "#^ ^ ^ ^ ^ ^ ^ ^ ^#",
      "## # # # # # # # ##",
      "#                  #",
      "###   #########  ###",
      "#  ^           ^   #",
      "#     #######      #",
      "#  ^  #     #  ^   #",
      "#     #  G  #      #",
      "#     #######      #",
      "####################"]},
];

function parseLevel(idx){
  const lvl=LEVELS[idx];
  const rows=lvl.map;
  mapRows=rows.length;
  mapCols=Math.max(...rows.map(r=>r.length));
  MAP=[]; fakeTiles={}; mPlats=[];
  let sx=40,sy=20;
  for(let r=0;r<mapRows;r++){
    MAP[r]=[];
    for(let c=0;c<mapCols;c++){
      const ch=rows[r]?.[c]??'';
      if(ch==='#'){MAP[r][c]='W';}
      else if(ch==='^'){MAP[r][c]='S';}
      else if(ch==='G'){MAP[r][c]='G';goalR=r;goalC=c;}
      else if(ch==='F'){MAP[r][c]='F';}
      else if(ch==='P'){MAP[r][c]=' ';sx=c*TS+2;sy=r*TS;}
      else{MAP[r][c]=' ';}
    }
  }
  if(lvl.mp) mPlats=lvl.mp.map(p=>({...p,cur:p.x,cy:p.y,t:Math.random()*20}));
  return{sx,sy};
}

function loadLevel(idx){
  levelIdx=idx; isDead=false; glitchT=0; particles=[];
  const{sx,sy}=parseLevel(idx);
  P.x=sx;P.y=sy;P.vx=0;P.vy=0;P.onGround=false;
  camX=0;camY=0;
  document.getElementById('lblLevel').textContent=`LEVEL ${idx+1}`;
  document.getElementById('lblDeaths').textContent=`DEATHS: ${deaths}`;
  showMsg(LEVELS[idx].msg,2800);
}

function showMsg(t,ms=2500){
  const el=document.getElementById('msgTxt');
  el.textContent=t; el.classList.add('show');
  clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

// ── Update
function update(dt){
  if(isDead||!gameRunning)return;
  const lvl=LEVELS[levelIdx];

  // Instant movement — no friction lag
  if(KEY.left)        { P.vx=-WALK; }
  else if(KEY.right)  { P.vx= WALK; }
  else                { P.vx=0; }

  // Coyote time — track how long since last grounded
  if(P.onGround) coyoteTimer=COYOTE_MS;
  else coyoteTimer=Math.max(0, coyoteTimer - dt*1000);

  if(jumpPressed){
    jumpPressed=false;
    if(coyoteTimer>0){
      P.vy=JUMP_V;
      P.onGround=false;
      coyoteTimer=0;
      playJumpSound();
    }
  }

  P.vy+=GRAVITY*dt;
  if(P.vy>700)P.vy=700;

  // fake tile timers
  Object.keys(fakeTiles).forEach(k=>{
    fakeTiles[k].life-=dt*1000;
    if(fakeTiles[k].life<=0)fakeTiles[k].broken=true;
  });

  // moving platforms
  mPlats.forEach(mp=>{
    mp.t+=dt;
    const cyc=mp.rng/mp.sp, ph=mp.t%(cyc*2);
    if(mp.ax==='x'){mp.cur=mp.x+(ph<cyc?ph*mp.sp:(cyc*2-ph)*mp.sp);mp.cy=mp.y;}
    else{mp.cur=mp.x;mp.cy=mp.y+(ph<cyc?ph*mp.sp:(cyc*2-ph)*mp.sp);}
  });

  P.onGround=false;
  stepAxis('x',P.vx*dt);
  stepAxis('y',P.vy*dt);

  if(P.y>mapRows*TS+100)die();
  checkGoal();

  // camera
  const tx=P.x+P.w/2-CW/2, ty=P.y+P.h/2-CH/2;
  camX+=(tx-camX)*0.14; camY+=(ty-camY)*0.14;
  camX=Math.max(0,Math.min(Math.max(0,mapCols*TS-CW),camX));
  camY=Math.max(0,Math.min(Math.max(0,mapRows*TS-CH),camY));

  particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt;p.a=p.life/p.ml;return p.life>0;});
  glitchT=Math.max(0,glitchT-dt);
}

function stepAxis(ax,delta){
  if(ax==='x')P.x+=delta; else P.y+=delta;
  const cL=Math.floor(P.x/TS), cR=Math.floor((P.x+P.w-1)/TS);
  const rT=Math.floor(P.y/TS), rB=Math.floor((P.y+P.h-1)/TS);
  for(let r=rT;r<=rB;r++){
    for(let c=cL;c<=cR;c++){
      const t=MAP[r]?.[c];
      if(!t||t===' ')continue;
      if(t==='S'){die();return;}
      if(t==='G')continue;
      if(t==='F'){
        const k=`${r}_${c}`;
        if(!fakeTiles[k])fakeTiles[k]={life:FAKE_MS,broken:false};
        if(fakeTiles[k].broken)continue;
      }
      const tx=c*TS,ty=r*TS;
      if(P.x+P.w<=tx||P.x>=tx+TS||P.y+P.h<=ty||P.y>=ty+TS)continue;
      if(ax==='x'){
        if(P.vx>0){P.x=tx-P.w;P.vx=0;}
        else{P.x=tx+TS;P.vx=0;}
      }else{
        if(P.vy>0){P.y=ty-P.h;P.vy=0;P.onGround=true;}
        else{P.y=ty+TS;P.vy=0;}
      }
    }
  }
  mPlats.forEach(mp=>{
    const px=mp.cur,py=mp.cy,pw=mp.w,ph=mp.h;
    if(P.x+P.w<=px||P.x>=px+pw||P.y+P.h<=py||P.y>=py+ph)return;
    if(ax==='y'){
      if(P.vy>=0){P.y=py-P.h;P.vy=0;P.onGround=true;}
      else{P.y=py+ph;P.vy=0;}
    }else{
      if(P.vx>0){P.x=px-P.w;P.vx=0;}else{P.x=px+pw;P.vx=0;}
    }
  });
}

function checkGoal(){
  const gx=goalC*TS,gy=goalR*TS;
  if(P.x+P.w>gx&&P.x<gx+TS&&P.y+P.h>gy&&P.y<gy+TS)nextLevel();
}

function nextLevel(){
  glitchT=0.25;
  playLevelSound();
  const n=levelIdx+1;
  if(n>=LEVELS.length){setTimeout(showEnding,400);return;}
  if(Math.random()<0.4)showMsg(CRYPTIC[Math.floor(Math.random()*CRYPTIC.length)]);
  setTimeout(()=>loadLevel(n),350);
}

function die(){
  if(isDead)return;
  isDead=true;deaths++;glitchT=0.7;
  playDeathSound();
  for(let i=0;i<20;i++)particles.push({x:P.x+P.w/2,y:P.y+P.h/2,vx:(Math.random()-.5)*150,vy:Math.random()*-170-30,life:.9+Math.random()*.5,ml:1.4,a:1,sz:2+Math.random()*3});
  setTimeout(()=>{

    document.getElementById('lblDeaths').textContent=`DEATHS: ${deaths}`;
    document.getElementById('deathScreen').classList.remove('hidden');
  },550);
}

// ── Render
function render(){
  const T=currentTheme;
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle=T.bg; ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle=T.gridStroke; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=TS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=TS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  ctx.save();
  ctx.translate(-Math.round(camX),-Math.round(camY));

  const c0=Math.max(0,Math.floor(camX/TS)-1),c1=Math.min(mapCols,c0+Math.ceil(CW/TS)+2);
  const r0=Math.max(0,Math.floor(camY/TS)-1),r1=Math.min(mapRows,r0+Math.ceil(CH/TS)+2);

  for(let r=r0;r<r1;r++){
    for(let c=c0;c<c1;c++){
      const t=MAP[r]?.[c],tx=c*TS,ty=r*TS;
      if(t==='W'){
        ctx.fillStyle=T.wall; ctx.fillRect(tx,ty,TS,TS);
        ctx.strokeStyle=T.wallStroke; ctx.lineWidth=.5; ctx.strokeRect(tx+.5,ty+.5,TS-1,TS-1);
        ctx.fillStyle=T.wallHi; ctx.fillRect(tx,ty,TS,3);
      }else if(t==='S'){
        ctx.fillStyle=T.spikeBg; ctx.fillRect(tx,ty,TS,TS);
        ctx.fillStyle=T.spike; ctx.beginPath();
        for(let i=0;i<3;i++){const sw=TS/3;ctx.moveTo(tx+i*sw,ty+TS);ctx.lineTo(tx+i*sw+sw/2,ty+3);ctx.lineTo(tx+i*sw+sw,ty+TS);}
        ctx.fill();
      }else if(t==='G'){
        const pulse=.5+.5*Math.sin(Date.now()*.003);
        ctx.fillStyle=T.goal.replace('{}',String(.08+pulse*.1)); ctx.fillRect(tx,ty,TS,TS);
        ctx.strokeStyle=T.goalStroke.replace('{}',String(.5+pulse*.5)); ctx.lineWidth=1.5; ctx.strokeRect(tx+2,ty+2,TS-4,TS-4);
        ctx.fillStyle=T.goal.replace('{}','1'); ctx.fillRect(tx+TS/2-3,ty+TS/2-3,6,6);
      }else if(t==='F'){
        const k=`${r}_${c}`,ft=fakeTiles[k];
        if(!ft||!ft.broken){
          ctx.globalAlpha=(ft?(ft.life/FAKE_MS):.9);
          ctx.fillStyle=T.fakeFill; ctx.fillRect(tx,ty,TS,TS);
          ctx.strokeStyle=T.fakeStroke; ctx.lineWidth=.5; ctx.strokeRect(tx+.5,ty+.5,TS-1,TS-1);
          ctx.globalAlpha=1;
        }
      }
    }
  }

  mPlats.forEach(mp=>{
    ctx.fillStyle=T.plat; ctx.fillRect(mp.cur,mp.cy,mp.w,mp.h);
    ctx.strokeStyle=T.platStroke; ctx.lineWidth=1; ctx.strokeRect(mp.cur+.5,mp.cy+.5,mp.w-1,mp.h-1);
    ctx.fillStyle=T.platHi; ctx.fillRect(mp.cur,mp.cy,mp.w,3);
  });

  if(!isDead){
    if(glitchT>0){ctx.shadowColor=T.spike; ctx.shadowBlur=12;}
    else{ctx.shadowColor=T.playerGlow; ctx.shadowBlur=6;}
    ctx.fillStyle=T.player; ctx.fillRect(P.x,P.y,P.w,P.h);
    ctx.shadowBlur=0; ctx.fillStyle=T.eye;
    const ex=P.vx<-5?P.x+1:P.x+P.w-4;
    ctx.fillRect(ex,P.y+3,3,3);
  }

  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=T.particle;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);});
  ctx.globalAlpha=1;
  ctx.restore();

  if(LEVELS[levelIdx]&&LEVELS[levelIdx].dark){
    const sx=P.x+P.w/2-camX,sy=P.y+P.h/2-camY;
    const g=ctx.createRadialGradient(sx,sy,30,sx,sy,260);
    g.addColorStop(0,T.darkOverlay+'0)');
    g.addColorStop(0.5,T.darkOverlay+'0.2)');
    g.addColorStop(1,T.darkOverlay+'0.75)');
    ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  }

  if(glitchT>0){
    ctx.fillStyle=`rgba(255,80,80,${glitchT*.08})`; ctx.fillRect(0,0,CW,CH);
    const sh=Math.floor(Math.random()*10)+3,sy2=Math.floor(Math.random()*CH);
    try{const d=ctx.getImageData(0,sy2,CW,sh);ctx.putImageData(d,Math.random()>.5?5:-5,sy2);}catch(e){}
  }

  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(let y=0;y<CH;y+=4)ctx.fillRect(0,y,CW,2);
  const vig=ctx.createRadialGradient(CW/2,CH/2,CH*.3,CW/2,CH/2,CH*.8);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,T.vigColor);
  ctx.fillStyle=vig; ctx.fillRect(0,0,CW,CH);
}

function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTS)/1000,.05);
  lastTS=ts;
  if(gameRunning)update(dt);
  render();
}

// ── SOUND ENGINE (Web Audio API — no files needed) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let bgGain = null;
let bgNodes = [];
let musicStarted = false;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new AudioCtx();
  bgGain = audioCtx.createGain();
  bgGain.gain.value = 0.10;
  bgGain.connect(audioCtx.destination);
}

// ── Background ambient music (soft, calm, mysterious) ──
function startBgMusic(){
  if(musicStarted || !audioCtx) return;
  musicStarted = true;

  // Very soft reverb-like tail using convolver
  const convolver = audioCtx.createConvolver();
  const revBuf = audioCtx.createBuffer(2, audioCtx.sampleRate*2, audioCtx.sampleRate);
  for(let c=0;c<2;c++){
    const d=revBuf.getChannelData(c);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*0.4;
  }
  convolver.buffer=revBuf;
  const revGain=audioCtx.createGain();
  revGain.gain.value=0.5;
  convolver.connect(revGain); revGain.connect(bgGain);

  // Soft sine pad — barely audible warm tone
  function makePad(freq, vol, detune=0){
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    osc.detune.value=detune;
    g.gain.value=vol;
    osc.connect(g); g.connect(bgGain);
    osc.connect(convolver);
    osc.start();
    bgNodes.push(osc);
  }
  makePad(55,  0.06);   // very soft bass
  makePad(82.4,0.04, 3);
  makePad(110, 0.03);

  // Gentle slow melody notes — like a music box
  const MELODY = [
    261.6, 0, 220, 0, 196, 0, 174.6,
    0, 196, 0, 220, 0, 261.6, 0,
    220, 0, 174.6, 0, 164.8, 0, 174.6
  ];
  let mIdx=0;
  function playMelodyNote(){
    if(!audioCtx||!musicStarted) return;
    const freq = MELODY[mIdx % MELODY.length];
    mIdx++;
    if(freq > 0){
      const osc=audioCtx.createOscillator();
      const env=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      const t=audioCtx.currentTime;
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(0.07, t+0.08);
      env.gain.exponentialRampToValueAtTime(0.001, t+1.8);
      osc.connect(env); env.connect(bgGain);
      osc.connect(convolver);
      osc.start(t); osc.stop(t+1.9);
    }
    setTimeout(playMelodyNote, 700 + Math.random()*200);
  }
  setTimeout(playMelodyNote, 1000);

  // Occasional soft high chime
  function playChime(){
    if(!audioCtx||!musicStarted) return;
    const CHIMES=[523.2,659.2,783.9,1046.5];
    const freq=CHIMES[Math.floor(Math.random()*CHIMES.length)];
    const osc=audioCtx.createOscillator();
    const env=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    const t=audioCtx.currentTime;
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(0.04,t+0.02);
    env.gain.exponentialRampToValueAtTime(0.001,t+2.5);
    osc.connect(env); env.connect(bgGain);
    osc.connect(convolver);
    osc.start(t); osc.stop(t+2.6);
    setTimeout(playChime, 3000+Math.random()*4000);
  }
  setTimeout(playChime, 2000);
}

// ── Death / glitch sound ──
function playDeathSound(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;

  // Harsh noise burst
  const bufSize = audioCtx.sampleRate * 0.3;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const noiseGain = audioCtx.createGain();
  const noiseFilt = audioCtx.createBiquadFilter();
  noiseFilt.type='bandpass'; noiseFilt.frequency.value=800; noiseFilt.Q.value=0.5;
  noiseGain.gain.setValueAtTime(0.6, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t+0.3);
  noise.connect(noiseFilt); noiseFilt.connect(noiseGain); noiseGain.connect(audioCtx.destination);
  noise.start(t); noise.stop(t+0.3);

  // Descending pitch crash
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(440, t);
  osc.frequency.exponentialRampToValueAtTime(40, t+0.4);
  oscGain.gain.setValueAtTime(0.4, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  osc.connect(oscGain); oscGain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.4);

  // Digital stutter clicks
  for(let i=0;i<6;i++){
    const click = audioCtx.createOscillator();
    const cg = audioCtx.createGain();
    click.type='square';
    click.frequency.value = 80 + Math.random()*400;
    const ct = t + i*0.04 + Math.random()*0.02;
    cg.gain.setValueAtTime(0.3, ct);
    cg.gain.exponentialRampToValueAtTime(0.001, ct+0.05);
    click.connect(cg); cg.connect(audioCtx.destination);
    click.start(ct); click.stop(ct+0.06);
  }
}

// ── Level complete sound ──
function playLevelSound(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const CHORD = [261.6, 329.6, 392, 523.2];
  CHORD.forEach((freq,i)=>{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    const st = t + i*0.06;
    g.gain.setValueAtTime(0, st);
    g.gain.linearRampToValueAtTime(0.15, st+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, st+0.6);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(st); osc.stop(st+0.65);
  });
}

// ── Jump sound ──
function playJumpSound(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(180, t);
  osc.frequency.exponentialRampToValueAtTime(360, t+0.12);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.16);
}

// ── Glitch ambient tick (random) ──
function playGlitchTick(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type='square';
  osc.frequency.value = 60 + Math.random()*300;
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.06);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.07);
}

setInterval(()=>{
  if(gameRunning&&!isDead&&Math.random()<.1){
    glitchT=.06+Math.random()*.1;
    playGlitchTick();
  }
},4000);

lastTS=performance.now();
requestAnimationFrame(loop);
</script>
