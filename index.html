<!DOCTYPE html>
<html lang="en">

<title>UNKNOWN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,300;1,300;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
.screen.hidden{display:none!important;}
#titleScreen{background:#000;}
.scan-line{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none;}
.t-logo{font-family:'Share Tech Mono',monospace;font-size:clamp(30px,9vw,56px);color:#ddd;letter-spacing:.35em;animation:glitch 5s infinite;}
.t-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,13px);color:#3a3a3a;letter-spacing:.5em;margin-top:14px;text-transform:uppercase;}
.t-hint{font-family:'Crimson Pro',serif;font-style:italic;font-size:clamp(13px,3.5vw,17px);color:#2d2d2d;margin-top:36px;}
.t-start{margin-top:56px;font-family:'Share Tech Mono',monospace;font-size:clamp(12px,3vw,15px);color:#666;border:1px solid #2a2a2a;padding:14px 44px;letter-spacing:.35em;background:transparent;cursor:pointer;transition:.3s;}
.t-start:active{color:#bbb;border-color:#666;}
.t-credit{position:absolute;bottom:18px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#252525;letter-spacing:.2em;}
#hud{position:fixed;top:0;left:0;width:100%;padding:10px 14px;display:none;justify-content:space-between;align-items:center;z-index:30;pointer-events:none;}
#hud span{font-family:'Share Tech Mono',monospace;font-size:11px;color:#383838;letter-spacing:.2em;pointer-events:none;}
#restartBtn{font-family:'Share Tech Mono',monospace;font-size:14px;color:#777;background:rgba(255,255,255,0.08);border:1px solid #444;border-radius:8px;padding:8px 16px;cursor:pointer;letter-spacing:.15em;pointer-events:all;-webkit-touch-callout:none;touch-action:manipulation;}
#restartBtn:active{color:#fff;border-color:#aaa;background:rgba(255,255,255,0.2);}
#msgWrap{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:9;pointer-events:none;}
#msgTxt{font-family:'Crimson Pro',serif;font-style:italic;font-size:clamp(14px,4vw,19px);color:#484848;text-align:center;padding:0 36px;line-height:1.7;opacity:0;transition:opacity 1.4s;max-width:340px;}
#msgTxt.show{opacity:1;}
#deathScreen{background:rgba(0,0,0,0.94);z-index:22;}
.d-title{font-family:'Share Tech Mono',monospace;font-size:clamp(22px,7vw,36px);color:#1c1c1c;letter-spacing:.4em;}
.d-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2.5vw,12px);color:#252525;margin-top:18px;letter-spacing:.25em;text-align:center;padding:0 30px;}
.d-retry{margin-top:48px;font-family:'Share Tech Mono',monospace;font-size:clamp(11px,3vw,14px);color:#505050;border:1px solid #1e1e1e;padding:12px 38px;letter-spacing:.3em;background:transparent;cursor:pointer;transition:.3s;}
.d-retry:active{color:#aaa;border-color:#555;}
#endScreen{background:#000;z-index:25;padding:28px;overflow-y:auto;}
#endLetter{font-family:'Crimson Pro',serif;font-style:italic;font-weight:300;font-size:clamp(15px,4.5vw,21px);color:#777;text-align:center;line-height:2;max-width:360px;white-space:pre-line;opacity:0;animation:revealUp 2s forwards 1s;}
#endHeart{font-size:clamp(22px,6vw,34px);opacity:0;animation:revealUp 2s forwards 7s;display:block;text-align:center;margin-top:28px;color:#555;}
#endCredit{font-family:'Share Tech Mono',monospace;font-size:10px;color:#222;letter-spacing:.3em;opacity:0;animation:revealUp 2s forwards 9s;display:block;text-align:center;margin-top:20px;}
#gameCanvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:block;image-rendering:pixelated;}
#ctrlBar{position:fixed;bottom:0;left:0;width:100%;padding:14px 18px 28px;display:none;justify-content:space-between;align-items:flex-end;z-index:11;}
.lr-wrap{display:flex;gap:10px;}
.btn-lr{width:74px;height:74px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,0.35);cursor:pointer;-webkit-touch-callout:none;transition:background .1s;}
.btn-lr.pressed,.btn-lr:active{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.8);}
#btnJump{width:90px;height:90px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.18);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;cursor:pointer;-webkit-touch-callout:none;transition:background .1s;}
#btnJump .j-arrow{font-size:24px;color:rgba(255,255,255,0.5);line-height:1;}
#btnJump .j-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:.15em;}
#btnJump.pressed,#btnJump:active{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.45);}
#btnJump.pressed .j-arrow{color:rgba(255,255,255,0.9);}
@keyframes glitch{0%,88%,100%{text-shadow:none;transform:none;}89%{text-shadow:-2px 0 #f00,2px 0 #0ff;transform:skewX(-1deg);}90%{text-shadow:2px 0 #f00,-2px 0 #0ff;transform:skewX(1deg);}91%{text-shadow:none;transform:none;}95%{text-shadow:-1px 0 #f00,1px 0 #0ff;}96%{text-shadow:none;}}
@keyframes revealUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  <button class="t-start" id="startBtn">[ ENTER ]</button>

</div>

  <div class="d-sub" id="deathMsg">You were never meant to reach the end. <br> © 2026 vibe coding — NLBNxAI</div>
  <button class="d-retry" id="retryBtn">[ TRY AGAIN ]</button>

</div>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <span id="lblLevel">LEVEL 1</span>
  <span id="lblDeaths">DEATHS: 0</span>
  <button id="restartBtn">↺</button>
</div>
<div id="msgWrap"><div id="msgTxt"></div></div>

<div id="ctrlBar">
  <div class="lr-wrap">
    <div class="btn-lr" id="btnLeft">◀</div>
    <div class="btn-lr" id="btnRight">▶</div>
  </div>
  <div id="btnJump">
    <span class="j-arrow">▲</span>
    <span class="j-label">JUMP</span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CW=320, CH=480, TS=20;

function resize(){
  const s=Math.min(window.innerWidth/CW, window.innerHeight/CH);
  canvas.width=CW; canvas.height=CH;
  canvas.style.width=Math.floor(CW*s)+'px';
  canvas.style.height=Math.floor(CH*s)+'px';
}
resize();
window.addEventListener('resize',resize);

// ── State
const KEY={left:false,right:false};
let jumpPressed=false, deaths=0, levelIdx=0;
let gameRunning=false, isDead=false;
let msgTimer=null, glitchT=0, lastTS=0;

// ── Player
const P={x:0,y:0,vx:0,vy:0,w:12,h:14,onGround:false};

// ── Level data
let MAP=[], mapRows=0, mapCols=0;
let goalR=0, goalC=0;
let fakeTiles={};
let mPlats=[];
let particles=[];
let camX=0, camY=0;

const FAKE_MS=600;
const GRAVITY=900, JUMP_V=-400, WALK=112, FRIC=0.70;

const CRYPTIC=["you are being observed.","not everything is what it seems.","keep going.","you're closer than you think.","why are you still here?","something remembers you.","the path was chosen before you arrived.","almost.","∅","do you feel it?","it was always meant to be you."];
const DEAD_MSG=["You were never meant to reach the end.","The path rejects you.","Try again. Or don't.","Nothing persists here.","Almost... but not yet.","The floor remembers.","You fell for it.","Again.","Pain is part of the design."];

// ── Levels
// tiles: #=wall space=air ^=spike G=goal F=fake P=spawn
const LEVELS=[
{msg:"find the door.", dark:false,
 map:["####################",
      "#                  #",
      "#  P               #",
      "#                  #",
      "######    ##########",
      "#                  #",
      "#                  #",
      "#     ######       #",
      "#                  #",
      "#                G #",
      "####################"]},

{msg:"not every step is safe.", dark:false,
 map:["####################",
      "#                  #",
      "# P                #",
      "######   ###########",
      "#    ^             #",
      "#  ######    ##### #",
      "#                  #",
      "#          ######  #",
      "#                G #",
      "####################"]},

{msg:"walls remember your touch.", dark:false,
 map:["####################",
      "#P                 #",
      "#                  #",
      "#                  #",
      "####               #",
      "#    ^             #",
      "#  ######          #",
      "#         ^        #",
      "#      ########    #",
      "#               G  #",
      "####################"]},

{msg:"you're closer than you think.", dark:false,
 map:["####################",
      "#                  #",
      "# P                #",
      "#######  FFFF  #####",
      "#                  #",
      "########  ##########",
      "#       ^          #",
      "#  ######  ########",
      "#              G   #",
      "####################"]},

{msg:"timing is everything.", dark:false,
 map:["####################",
      "#P                 #",
      "###                #",
      "#   ^   ^   ^   ^  #",
      "####################",
      "#                  #",
      "#                  #",
      "#              G   #",
      "####################"],
 mp:[{x:60,y:180,w:56,h:10,sp:45,rng:120,ax:'x'}]},

{msg:"something is watching.", dark:false,
 map:["####################",
      "#P    #    #       #",
      "#     #    #  ##   #",
      "## ####    ####    #",
      "#      ^   ^       #",
      "#  #####   #########",
      "#      ^           #",
      "######    ##########",
      "#              G   #",
      "####################"]},

{msg:"do you feel it?", dark:true,
 map:["####################",
      "#P                 #",
      "#  ##    ##   ##   #",
      "#   # ^  #  ^ #    #",
      "#   #    #    # ## #",
      "#   #####     ####  ",
      "#              ^   #",
      "#######    #########",
      "#              G   #",
      "####################"]},

{msg:"why are you still here?", dark:true,
 map:["####################",
      "#P  #    #    #    #",
      "#   #    #    #    #",
      "# ###  ###  ###    #",
      "#   ^       ^      #",
      "####  ##########  ##",
      "#  ^  ^  ^  ^  ^  #",
      "##   ###########  ##",
      "#              G   #",
      "####################"]},

{msg:"almost.", dark:true,
 map:["####################",
      "#P                 #",
      "##                 #",
      "#    ^   ^   ^     #",
      "####################",
      "#                  #",
      "#    ^   ^   ^     #",
      "#############  #####",
      "#              G   #",
      "####################"],
 mp:[{x:60,y:200,w:50,h:10,sp:40,rng:100,ax:'x'},{x:160,y:280,w:50,h:10,sp:50,rng:80,ax:'x'}]},

{msg:"∅", dark:true,
 map:["####################",
      "#P ^ ^ ^ ^ ^ ^ ^ ^#",
      "####################",
      "#^ ^ ^ ^ ^ ^ ^ ^ ^#",
      "## # # # # # # # ##",
      "#                  #",
      "###   #########  ###",
      "#  ^           ^   #",
      "#######    #########",
      "#          G       #",
      "####################"]},

{msg:"one way leads nowhere.", dark:true,
 map:["####################",
      "#P  ###   ###   ## #",
      "#   # ^   ^ #   #  #",
      "#   #       #   #  #",
      "####  ###   #### ^ #",
      "#  ^  # ^          #",
      "#  ######  #########",
      "#       ^       ^  #",
      "#########  #########",
      "#              G   #",
      "####################"]},

{msg:"it was always meant to be you.", dark:true,
 map:["####################",
      "#                  #",
      "#  P    #####      #",
      "#       #   #  ^   #",
      "#  ######   ########",
      "#  #            ^  #",
      "#  #  ###  ######  #",
      "#  #  # ^          #",
      "#  #  #    G  #####",
      "########    ########",
      "####################"]},

{msg:"something is waiting.", dark:true, final:true,
 map:["####################",
      "#P ^ ^ ^ ^ ^ ^ ^ ^#",
      "####################",
      "#^ ^ ^ ^ ^ ^ ^ ^ ^#",
      "## # # # # # # # ##",
      "#                  #",
      "###   #########  ###",
      "#  ^           ^   #",
      "#     #######      #",
      "#  ^  #     #  ^   #",
      "#     #  G  #      #",
      "#     #######      #",
      "####################"]},
];

function parseLevel(idx){
  const lvl=LEVELS[idx];
  const rows=lvl.map;
  mapRows=rows.length;
  mapCols=Math.max(...rows.map(r=>r.length));
  MAP=[]; fakeTiles={}; mPlats=[];
  let sx=40,sy=20;
  for(let r=0;r<mapRows;r++){
    MAP[r]=[];
    for(let c=0;c<mapCols;c++){
      const ch=rows[r]?.[c]??'';
      if(ch==='#'){MAP[r][c]='W';}
      else if(ch==='^'){MAP[r][c]='S';}
      else if(ch==='G'){MAP[r][c]='G';goalR=r;goalC=c;}
      else if(ch==='F'){MAP[r][c]='F';}
      else if(ch==='P'){MAP[r][c]=' ';sx=c*TS+2;sy=r*TS;}
      else{MAP[r][c]=' ';}
    }
  }
  if(lvl.mp) mPlats=lvl.mp.map(p=>({...p,cur:p.x,cy:p.y,t:Math.random()*20}));
  return{sx,sy};
}

function loadLevel(idx){
  levelIdx=idx; isDead=false; glitchT=0; particles=[];
  const{sx,sy}=parseLevel(idx);
  P.x=sx;P.y=sy;P.vx=0;P.vy=0;P.onGround=false;
  camX=0;camY=0;
  document.getElementById('lblLevel').textContent=`LEVEL ${idx+1}`;
  document.getElementById('lblDeaths').textContent=`DEATHS: ${deaths}`;
  showMsg(LEVELS[idx].msg,2800);
}

function showMsg(t,ms=2500){
  const el=document.getElementById('msgTxt');
  el.textContent=t; el.classList.add('show');
  clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

// ── Update
function update(dt){
  if(isDead||!gameRunning)return;
  const lvl=LEVELS[levelIdx];

  // Instant movement — no friction lag
  if(KEY.left)        { P.vx=-WALK; }
  else if(KEY.right)  { P.vx= WALK; }
  else                { P.vx=0; }  // stop instantly when no key held

  if(jumpPressed){
    if(P.onGround){P.vy=JUMP_V;P.onGround=false;}
    jumpPressed=false;
  }

  P.vy+=GRAVITY*dt;
  if(P.vy>700)P.vy=700;

  // fake tile timers
  Object.keys(fakeTiles).forEach(k=>{
    fakeTiles[k].life-=dt*1000;
    if(fakeTiles[k].life<=0)fakeTiles[k].broken=true;
  });

  // moving platforms
  mPlats.forEach(mp=>{
    mp.t+=dt;
    const cyc=mp.rng/mp.sp, ph=mp.t%(cyc*2);
    if(mp.ax==='x'){mp.cur=mp.x+(ph<cyc?ph*mp.sp:(cyc*2-ph)*mp.sp);mp.cy=mp.y;}
    else{mp.cur=mp.x;mp.cy=mp.y+(ph<cyc?ph*mp.sp:(cyc*2-ph)*mp.sp);}
  });

  P.onGround=false;
  stepAxis('x',P.vx*dt);
  stepAxis('y',P.vy*dt);

  if(P.y>mapRows*TS+100)die();
  checkGoal();

  // camera
  const tx=P.x+P.w/2-CW/2, ty=P.y+P.h/2-CH/2;
  camX+=(tx-camX)*0.14; camY+=(ty-camY)*0.14;
  camX=Math.max(0,Math.min(Math.max(0,mapCols*TS-CW),camX));
  camY=Math.max(0,Math.min(Math.max(0,mapRows*TS-CH),camY));

  particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt;p.a=p.life/p.ml;return p.life>0;});
  glitchT=Math.max(0,glitchT-dt);
}

function stepAxis(ax,delta){
  if(ax==='x')P.x+=delta; else P.y+=delta;
  const cL=Math.floor(P.x/TS), cR=Math.floor((P.x+P.w-1)/TS);
  const rT=Math.floor(P.y/TS), rB=Math.floor((P.y+P.h-1)/TS);
  for(let r=rT;r<=rB;r++){
    for(let c=cL;c<=cR;c++){
      const t=MAP[r]?.[c];
      if(!t||t===' ')continue;
      if(t==='S'){die();return;}
      if(t==='G')continue;
      if(t==='F'){
        const k=`${r}_${c}`;
        if(!fakeTiles[k])fakeTiles[k]={life:FAKE_MS,broken:false};
        if(fakeTiles[k].broken)continue;
      }
      const tx=c*TS,ty=r*TS;
      if(P.x+P.w<=tx||P.x>=tx+TS||P.y+P.h<=ty||P.y>=ty+TS)continue;
      if(ax==='x'){
        if(P.vx>0){P.x=tx-P.w;P.vx=0;}
        else{P.x=tx+TS;P.vx=0;}
      }else{
        if(P.vy>0){P.y=ty-P.h;P.vy=0;P.onGround=true;}
        else{P.y=ty+TS;P.vy=0;}
      }
    }
  }
  mPlats.forEach(mp=>{
    const px=mp.cur,py=mp.cy,pw=mp.w,ph=mp.h;
    if(P.x+P.w<=px||P.x>=px+pw||P.y+P.h<=py||P.y>=py+ph)return;
    if(ax==='y'){
      if(P.vy>=0){P.y=py-P.h;P.vy=0;P.onGround=true;}
      else{P.y=py+ph;P.vy=0;}
    }else{
      if(P.vx>0){P.x=px-P.w;P.vx=0;}else{P.x=px+pw;P.vx=0;}
    }
  });
}

function checkGoal(){
  const gx=goalC*TS,gy=goalR*TS;
  if(P.x+P.w>gx&&P.x<gx+TS&&P.y+P.h>gy&&P.y<gy+TS)nextLevel();
}

function nextLevel(){
  glitchT=0.25;
  const n=levelIdx+1;
  if(n>=LEVELS.length){setTimeout(showEnding,400);return;}
  if(Math.random()<0.4)showMsg(CRYPTIC[Math.floor(Math.random()*CRYPTIC.length)]);
  setTimeout(()=>loadLevel(n),350);
}

function die(){
  if(isDead)return;
  isDead=true;deaths++;glitchT=0.7;
  for(let i=0;i<20;i++)particles.push({x:P.x+P.w/2,y:P.y+P.h/2,vx:(Math.random()-.5)*150,vy:Math.random()*-170-30,life:.9+Math.random()*.5,ml:1.4,a:1,sz:2+Math.random()*3});
  setTimeout(()=>{
    document.getElementById('deathMsg').textContent=DEAD_MSG[deaths%DEAD_MSG.length];
    document.getElementById('lblDeaths').textContent=`DEATHS: ${deaths}`;
    document.getElementById('deathScreen').classList.remove('hidden');
  },550);
}

// ── Render
function render(){
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#080808';ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(255,255,255,0.012)';ctx.lineWidth=1;
  for(let x=0;x<CW;x+=TS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=TS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  ctx.save();
  ctx.translate(-Math.round(camX),-Math.round(camY));

  const c0=Math.max(0,Math.floor(camX/TS)-1),c1=Math.min(mapCols,c0+Math.ceil(CW/TS)+2);
  const r0=Math.max(0,Math.floor(camY/TS)-1),r1=Math.min(mapRows,r0+Math.ceil(CH/TS)+2);

  for(let r=r0;r<r1;r++){
    for(let c=c0;c<c1;c++){
      const t=MAP[r]?.[c],tx=c*TS,ty=r*TS;
      if(t==='W'){
        ctx.fillStyle='#181818';ctx.fillRect(tx,ty,TS,TS);
        ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=.5;ctx.strokeRect(tx+.5,ty+.5,TS-1,TS-1);
      }else if(t==='S'){
        ctx.fillStyle='#200e0e';ctx.fillRect(tx,ty,TS,TS);
        ctx.fillStyle='#bb2222';ctx.beginPath();
        for(let i=0;i<3;i++){const sw=TS/3;ctx.moveTo(tx+i*sw,ty+TS);ctx.lineTo(tx+i*sw+sw/2,ty+3);ctx.lineTo(tx+i*sw+sw,ty+TS);}
        ctx.fill();
      }else if(t==='G'){
        const pulse=.5+.5*Math.sin(Date.now()*.003);
        ctx.fillStyle=`rgba(210,210,160,${.04+pulse*.07})`;ctx.fillRect(tx,ty,TS,TS);
        ctx.strokeStyle=`rgba(220,220,160,${.25+pulse*.3})`;ctx.lineWidth=1;ctx.strokeRect(tx+2,ty+2,TS-4,TS-4);
        ctx.fillStyle=`rgba(255,255,180,${.5+pulse*.5})`;ctx.fillRect(tx+TS/2-2,ty+TS/2-2,4,4);
      }else if(t==='F'){
        const k=`${r}_${c}`,ft=fakeTiles[k];
        if(!ft||!ft.broken){
          ctx.globalAlpha=(ft?(ft.life/FAKE_MS):.8);
          ctx.fillStyle='#181818';ctx.fillRect(tx,ty,TS,TS);
          ctx.strokeStyle='rgba(255,80,80,0.15)';ctx.lineWidth=.5;ctx.strokeRect(tx+.5,ty+.5,TS-1,TS-1);
          ctx.globalAlpha=1;
        }
      }
    }
  }

  mPlats.forEach(mp=>{
    ctx.fillStyle='#202020';ctx.fillRect(mp.cur,mp.cy,mp.w,mp.h);
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=.5;ctx.strokeRect(mp.cur+.5,mp.cy+.5,mp.w-1,mp.h-1);
  });

  if(!isDead){
    if(glitchT>0){ctx.shadowColor='#f00';ctx.shadowBlur=10;}
    ctx.fillStyle='#d0d0d0';ctx.fillRect(P.x,P.y,P.w,P.h);
    ctx.shadowBlur=0;ctx.fillStyle='#080808';
    const ex=P.vx<-5?P.x+1:P.x+P.w-4;
    ctx.fillRect(ex,P.y+3,3,3);
  }

  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle='#999';ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);});
  ctx.globalAlpha=1;
  ctx.restore();

  if(LEVELS[levelIdx]&&LEVELS[levelIdx].dark){
    const sx=P.x+P.w/2-camX,sy=P.y+P.h/2-camY;
    const g=ctx.createRadialGradient(sx,sy,18,sx,sy,150);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.45,'rgba(0,0,0,0.55)');g.addColorStop(1,'rgba(0,0,0,0.97)');
    ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  }

  if(glitchT>0){
    ctx.fillStyle=`rgba(255,0,0,${glitchT*.08})`;ctx.fillRect(0,0,CW,CH);
    const sh=Math.floor(Math.random()*10)+3,sy2=Math.floor(Math.random()*CH);
    try{const d=ctx.getImageData(0,sy2,CW,sh);ctx.putImageData(d,Math.random()>.5?5:-5,sy2);}catch(e){}
  }

  ctx.fillStyle='rgba(0,0,0,0.07)';
  for(let y=0;y<CH;y+=4)ctx.fillRect(0,y,CW,2);
  const vig=ctx.createRadialGradient(CW/2,CH/2,CH*.2,CW/2,CH/2,CH*.75);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,CW,CH);
}

function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTS)/1000,.05);
  lastTS=ts;
  if(gameRunning)update(dt);
  render();
}

// ── Controls
function doJump(){
  if(!gameRunning||isDead) return;
  if(P.onGround){
    P.vy=JUMP_V;
    P.onGround=false;
  }
  jumpPressed=true; // also buffer in case called between frames
}

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')KEY.left=true;
  if(e.key==='ArrowRight'||e.key==='d')KEY.right=true;
  if(e.key==='ArrowUp'||e.key==='w'||e.key===' ')doJump();
  e.preventDefault();
},{passive:false});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')KEY.left=false;
  if(e.key==='ArrowRight'||e.key==='d')KEY.right=false;
});

function bindBtn(id,down,up){
  const el=document.getElementById(id);
  function onDown(e){e.preventDefault();e.stopPropagation();down();el.classList.add('pressed');}
  function onUp(e){e.preventDefault();e.stopPropagation();if(up)up();el.classList.remove('pressed');}
  el.addEventListener('touchstart',onDown,{passive:false});
  el.addEventListener('touchend',onUp,{passive:false});
  el.addEventListener('touchcancel',onUp,{passive:false});
  el.addEventListener('mousedown',onDown);
  el.addEventListener('mouseup',onUp);
  el.addEventListener('mouseleave',onUp);
}
bindBtn('btnLeft',()=>KEY.left=true,()=>KEY.left=false);
bindBtn('btnRight',()=>KEY.right=true,()=>KEY.right=false);
bindBtn('btnJump',()=>doJump(),null);

function showEnding(){
  gameRunning=false;
  document.getElementById('ctrlBar').style.display='none';
  document.getElementById('endScreen').classList.remove('hidden');
  const el=document.getElementById('endLetter');
  const lines=["If you reached this point…","it means you solved every mystery.","navigated every trap.","refused to give up."," ","But the real secret of this game…","was never the puzzles."," ","It was this message."," ","I just wanted to tell you something","I couldn't say out loud…"," ","I love you."];
  let d=1000;
  lines.forEach((ln,i)=>{
    setTimeout(()=>{
      if(ln===' '){el.innerHTML+='\n\n';return;}
      el.innerHTML+=(i===0?'':'\n')+ln;
    },d);
    d+=ln===' '?300:700;
  });
}

// ── Restart button (works anytime during gameplay)
const restartEl=document.getElementById('restartBtn');
function doRestart(e){
  if(e)e.preventDefault();
  document.getElementById('deathScreen').classList.add('hidden');
  isDead=false;
  deaths++;
  document.getElementById('lblDeaths').textContent=`DEATHS: ${deaths}`;
  KEY.left=false; KEY.right=false; jumpPressed=false;
  loadLevel(levelIdx);
}
restartEl.addEventListener('touchstart',doRestart,{passive:false});
restartEl.addEventListener('click',doRestart);

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  document.getElementById('ctrlBar').style.display='flex';
  gameRunning=true;
  loadLevel(0);
});
document.getElementById('retryBtn').addEventListener('click',()=>{
  document.getElementById('deathScreen').classList.add('hidden');
  isDead=false;
  loadLevel(levelIdx);
});

setInterval(()=>{if(gameRunning&&!isDead&&Math.random()<.1)glitchT=.06+Math.random()*.1;},4000);

lastTS=performance.now();
requestAnimationFrame(loop);
</script>
</body>
